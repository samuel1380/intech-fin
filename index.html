<!DOCTYPE html>
<html lang="pt-BR">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />

  <!-- SEO & PWA Primary -->
  <title>FinNexus Enterprise - Gestão Financeira</title>
  <meta name="description" content="Plataforma enterprise de gestão financeira com IA, relatórios avançados e controle total de fluxo de caixa." />
  <meta name="keywords" content="gestão financeira, enterprise, fluxo de caixa, relatórios financeiros, contabilidade" />
  <meta name="author" content="InTech Finance" />

  <!-- PWA Manifest -->
  <link rel="manifest" href="/manifest.json" />

  <!-- Favicon -->
  <link rel="icon" type="image/png" href="/icons/icon-192x192.png" />
  <link rel="shortcut icon" href="/icons/icon-192x192.png" />

  <!-- Apple PWA (iOS) -->
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <meta name="apple-mobile-web-app-title" content="FinNexus" />
  <link rel="apple-touch-icon" href="/icons/icon-192x192.png" />
  <link rel="apple-touch-icon" sizes="152x152" href="/icons/icon-144x144.png" />
  <link rel="apple-touch-icon" sizes="512x512" href="/icons/icon-512x512.png" />

  <!-- Theme & Color -->
  <meta name="theme-color" content="#4F46E5" />
  <meta name="msapplication-TileColor" content="#4F46E5" />
  <meta name="msapplication-TileImage" content="/icons/icon-144x144.png" />

  <!-- Open Graph -->
  <meta property="og:title" content="FinNexus Enterprise" />
  <meta property="og:description" content="Gestão Financeira Empresarial Inteligente" />
  <meta property="og:type" content="website" />
  <meta property="og:image" content="/icons/icon-512x512.png" />

  <!-- Google Fonts - Inter -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">

  <!-- Tailwind CDN -->
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      darkMode: 'class',
      theme: {
        extend: {
          fontFamily: {
            sans: ['Inter', '-apple-system', 'BlinkMacSystemFont', 'Segoe UI', 'sans-serif'],
            mono: ['SF Mono', 'ui-monospace', 'SFMono-Regular', 'Menlo', 'Monaco', 'Consolas', 'monospace'],
          },
          colors: {
            brand: {
              50: '#EEF2FF',
              100: '#E0E7FF',
              200: '#C7D2FE',
              300: '#A5B4FC',
              400: '#818CF8',
              500: '#6366F1',
              600: '#4F46E5',
              700: '#4338CA',
              800: '#3730A3',
              900: '#312E81',
              950: '#1E1B4B',
            },
            surface: {
              0: '#FFFFFF',
              50: '#F8FAFC',
              100: '#F1F5F9',
              200: '#E2E8F0',
              300: '#CBD5E1',
              400: '#94A3B8',
              500: '#64748B',
              600: '#475569',
              700: '#334155',
              800: '#1E293B',
              900: '#0F172A',
              950: '#020617',
            },
            success: {
              50: '#ECFDF5',
              100: '#D1FAE5',
              500: '#10B981',
              600: '#059669',
              700: '#047857',
            },
            danger: {
              50: '#FEF2F2',
              100: '#FEE2E2',
              500: '#EF4444',
              600: '#DC2626',
              700: '#B91C1C',
            },
            warning: {
              50: '#FFFBEB',
              100: '#FEF3C7',
              500: '#F59E0B',
              600: '#D97706',
              700: '#B45309',
            },
          },
          borderRadius: {
            'xl': '0.75rem',
            '2xl': '1rem',
            '3xl': '1.25rem',
          },
          boxShadow: {
            'card': '0 1px 3px 0 rgb(0 0 0 / 0.02), 0 1px 2px -1px rgb(0 0 0 / 0.02)',
            'card-hover': '0 4px 12px -2px rgb(0 0 0 / 0.06), 0 2px 4px -2px rgb(0 0 0 / 0.04)',
            'elevated': '0 8px 25px -5px rgb(0 0 0 / 0.06), 0 4px 10px -4px rgb(0 0 0 / 0.04)',
            'premium': '0 0 0 1px rgb(0 0 0 / 0.03), 0 2px 4px rgb(0 0 0 / 0.02), 0 12px 24px rgb(0 0 0 / 0.03)',
          },
          animation: {
            'fade-in': 'fadeIn 0.4s cubic-bezier(0.16, 1, 0.3, 1)',
            'fade-in-up': 'fadeInUp 0.5s cubic-bezier(0.16, 1, 0.3, 1)',
            'slide-in': 'slideIn 0.3s cubic-bezier(0.16, 1, 0.3, 1)',
            'scale-in': 'scaleIn 0.2s cubic-bezier(0.16, 1, 0.3, 1)',
          },
          keyframes: {
            fadeIn: {
              '0%': { opacity: '0' },
              '100%': { opacity: '1' },
            },
            fadeInUp: {
              '0%': { opacity: '0', transform: 'translateY(8px)' },
              '100%': { opacity: '1', transform: 'translateY(0)' },
            },
            slideIn: {
              '0%': { opacity: '0', transform: 'translateX(-8px)' },
              '100%': { opacity: '1', transform: 'translateX(0)' },
            },
            scaleIn: {
              '0%': { opacity: '0', transform: 'scale(0.96)' },
              '100%': { opacity: '1', transform: 'scale(1)' },
            },
          },
        }
      }
    }
  </script>

  <style>
    /* Premium Scrollbar */
    ::-webkit-scrollbar { width: 5px; height: 5px; }
    ::-webkit-scrollbar-track { background: transparent; }
    ::-webkit-scrollbar-thumb { background: #CBD5E1; border-radius: 100px; }
    ::-webkit-scrollbar-thumb:hover { background: #94A3B8; }
    .dark ::-webkit-scrollbar-thumb { background: #334155; }
    .dark ::-webkit-scrollbar-thumb:hover { background: #475569; }

    /* Smooth Selection */
    ::selection {
      background: rgba(79, 70, 229, 0.15);
      color: #312E81;
    }
    .dark ::selection {
      background: rgba(99, 102, 241, 0.25);
      color: #C7D2FE;
    }

    /* Glassmorphism Panels */
    .glass-card {
      background: rgba(255, 255, 255, 0.92);
      backdrop-filter: blur(20px);
      -webkit-backdrop-filter: blur(20px);
      border: 1px solid rgba(0, 0, 0, 0.04);
    }
    .dark .glass-card {
      background: rgba(15, 23, 42, 0.7);
      border: 1px solid rgba(255, 255, 255, 0.06);
    }

    .glass-panel {
      background: rgba(255, 255, 255, 0.96);
      backdrop-filter: blur(24px);
      -webkit-backdrop-filter: blur(24px);
      border: 1px solid rgba(0, 0, 0, 0.03);
    }
    .dark .glass-panel {
      background: rgba(15, 23, 42, 0.8);
      border: 1px solid rgba(255, 255, 255, 0.05);
    }

    /* Table Row Hover */
    .table-row-hover { transition: background-color 0.15s ease; }
    .table-row-hover:hover { background-color: rgba(248, 250, 252, 0.8); }
    .dark .table-row-hover:hover { background-color: rgba(30, 41, 59, 0.4); }

    /* iOS & Android Safe Areas */
    :root {
      --sat: env(safe-area-inset-top, 0px);
      --sab: env(safe-area-inset-bottom, 0px);
    }

    .safe-padding-bottom {
      padding-bottom: max(var(--sab), 1rem) !important;
    }

    .safe-padding-top {
      padding-top: max(var(--sat), 1rem) !important;
    }

    @media all and (display-mode: standalone) and (max-width: 768px) {
      .safe-padding-top {
        padding-top: max(var(--sat), 45px) !important;
      }
      .safe-padding-bottom {
        padding-bottom: max(var(--sab), 24px) !important;
      }
    }

    /* Transitions */
    html {
      transition: background-color 0.3s ease;
      -webkit-font-smoothing: antialiased;
      -moz-osx-font-smoothing: grayscale;
    }
    .dark body { background-color: #0B1120; }

    /* Focus Ring */
    *:focus-visible {
      outline: 2px solid #6366F1;
      outline-offset: 2px;
      border-radius: 8px;
    }

    /* Subtle animation for interactive elements */
    .btn-premium {
      transition: all 0.2s cubic-bezier(0.16, 1, 0.3, 1);
    }
    .btn-premium:active {
      transform: scale(0.98);
    }

    /* Input focus states */
    input:focus, select:focus, textarea:focus {
      box-shadow: 0 0 0 3px rgba(79, 70, 229, 0.1);
    }
    .dark input:focus, .dark select:focus, .dark textarea:focus {
      box-shadow: 0 0 0 3px rgba(99, 102, 241, 0.15);
    }
  </style>

  <!-- Service Worker Registration -->
  <script>
    if ('serviceWorker' in navigator) {
      window.addEventListener('load', function () {
        navigator.serviceWorker.register('/sw.js', { scope: '/' })
          .then(function (reg) {
            console.log('[PWA] Service Worker registrado:', reg.scope);
          })
          .catch(function (err) {
            console.warn('[PWA] Falha ao registrar SW:', err);
          });
      });
    }
  </script>
</head>

<body class="text-surface-900 dark:text-surface-100 dark:bg-[#0B1120] antialiased overflow-hidden transition-colors duration-300">
  <div id="root"></div>

  <script type="module" src="/index.tsx"></script>
</body>

</html>
