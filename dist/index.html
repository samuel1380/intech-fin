<!DOCTYPE html>
<html lang="pt-BR">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />

  <!-- SEO & PWA Primary -->
  <title>FinNexus Enterprise - Gestão Financeira</title>
  <meta name="description" content="Plataforma enterprise de gestão financeira com IA, relatórios avançados e controle total de fluxo de caixa." />
  <meta name="keywords" content="gestão financeira, enterprise, fluxo de caixa, relatórios financeiros, contabilidade" />
  <meta name="author" content="InTech Finance" />

  <!-- PWA Manifest -->
  <link rel="manifest" href="/manifest.json" />

  <!-- Favicon -->
  <link rel="icon" type="image/png" href="/icons/icon-192x192.png" />
  <link rel="shortcut icon" href="/icons/icon-192x192.png" />

  <!-- Apple PWA (iOS) -->
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <meta name="apple-mobile-web-app-title" content="FinNexus" />
  <link rel="apple-touch-icon" href="/icons/icon-192x192.png" />
  <link rel="apple-touch-icon" sizes="152x152" href="/icons/icon-144x144.png" />
  <link rel="apple-touch-icon" sizes="512x512" href="/icons/icon-512x512.png" />

  <!-- Theme & Color -->
  <meta name="theme-color" content="#4f46e5" />
  <meta name="msapplication-TileColor" content="#4f46e5" />
  <meta name="msapplication-TileImage" content="/icons/icon-144x144.png" />

  <!-- Open Graph -->
  <meta property="og:title" content="FinNexus Enterprise" />
  <meta property="og:description" content="Gestão Financeira Empresarial Inteligente" />
  <meta property="og:type" content="website" />
  <meta property="og:image" content="/icons/icon-512x512.png" />

  <!-- Google Fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">

  <!-- Tailwind CDN -->
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      darkMode: 'class',
      theme: {
        extend: {
          fontFamily: {
            sans: ['Inter', 'sans-serif'],
            mono: ['ui-monospace', 'SFMono-Regular', 'Menlo', 'Monaco', 'Consolas', 'monospace'],
          },
          colors: {
            primary: {
              50: '#eef2ff',
              100: '#e0e7ff',
              500: '#6366f1',
              600: '#4f46e5',
              700: '#4338ca',
              900: '#312e81',
            },
            slate: {
              850: '#1e293b',
              900: '#0f172a',
              950: '#020617',
            }
          },
          animation: {
            'fade-in': 'fadeIn 0.5s ease-out',
            'fade-in-up': 'fadeInUp 0.6s ease-out',
            'pulse-slow': 'pulse 3s cubic-bezier(0.4, 0, 0.6, 1) infinite',
            'slide-in-bottom': 'slideInBottom 0.3s ease-out',
          },
          keyframes: {
            fadeIn: {
              '0%': { opacity: '0' },
              '100%': { opacity: '1' },
            },
            fadeInUp: {
              '0%': { opacity: '0', transform: 'translateY(10px)' },
              '100%': { opacity: '1', transform: 'translateY(0)' },
            },
            slideInBottom: {
              '0%': { opacity: '0', transform: 'translateX(-50%) translateY(20px)' },
              '100%': { opacity: '1', transform: 'translateX(-50%) translateY(0)' },
            }
          }
        }
      }
    }
  </script>

  <style>
    /* Modern Scrollbar - Light */
    ::-webkit-scrollbar { width: 6px; height: 6px; }
    ::-webkit-scrollbar-track { background: transparent; }
    ::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 10px; }
    ::-webkit-scrollbar-thumb:hover { background: #94a3b8; }
    .dark ::-webkit-scrollbar-thumb { background: #334155; }
    .dark ::-webkit-scrollbar-thumb:hover { background: #475569; }

    /* Glassmorphism */
    .glass-panel {
      background: rgba(255,255,255,0.95);
      backdrop-filter: blur(8px);
      -webkit-backdrop-filter: blur(8px);
      border: 1px solid rgba(226,232,240,0.6);
    }
    .dark .glass-panel {
      background: rgba(15,23,42,0.75);
      border: 1px solid rgba(255,255,255,0.08);
    }
    .glass-card-dark {
      background: rgba(15,23,42,0.6);
      backdrop-filter: blur(12px);
      -webkit-backdrop-filter: blur(12px);
      border: 1px solid rgba(255,255,255,0.1);
    }

    /* Table */
    .table-row-hover:hover td { transition: background-color 0.2s; }

    /* iOS Safe Areas */
    .safe-padding-bottom { padding-bottom: env(safe-area-inset-bottom, 1rem); }
    .safe-padding-top { padding-top: env(safe-area-inset-top, 0px); }

    /* Theme transition */
    html { transition: background-color 0.3s ease; }
    .dark body { background-color: #0c1222; }
    .dark ::selection { background: rgba(99,102,241,0.3); color: #e0e7ff; }

    /* PWA Install Banner */
    #pwa-install-banner {
      position: fixed;
      bottom: env(safe-area-inset-bottom, 0);
      left: 0; right: 0;
      z-index: 9999;
      padding: 16px;
      background: linear-gradient(135deg, #4f46e5, #7c3aed);
      color: white;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
      box-shadow: 0 -4px 20px rgba(79, 70, 229, 0.3);
      transform: translateY(100%);
      transition: transform 0.4s cubic-bezier(0.4, 0, 0.2, 1);
    }
    #pwa-install-banner.show { transform: translateY(0); }
    #pwa-install-banner .banner-text { font-size: 14px; font-weight: 600; line-height: 1.3; }
    #pwa-install-banner .banner-text small { display: block; font-size: 11px; opacity: 0.8; font-weight: 400; margin-top: 2px; }
    #pwa-install-banner button {
      padding: 8px 16px; border-radius: 10px; font-size: 13px; font-weight: 700;
      cursor: pointer; border: none; white-space: nowrap; transition: all 0.2s;
    }
    #btn-install { background: white; color: #4f46e5; }
    #btn-install:hover { background: #e0e7ff; }
    #btn-dismiss { background: rgba(255,255,255,0.15); color: white; }
    #btn-dismiss:hover { background: rgba(255,255,255,0.25); }
  </style>

  <!-- Service Worker Registration -->
  <script>
    if ('serviceWorker' in navigator) {
      window.addEventListener('load', function () {
        navigator.serviceWorker.register('/sw.js', { scope: '/' })
          .then(function (reg) {
            console.log('[PWA] Service Worker registrado:', reg.scope);
          })
          .catch(function (err) {
            console.warn('[PWA] Falha ao registrar SW:', err);
          });
      });
    }

    // PWA Install Prompt
    let deferredPrompt = null;
    window.addEventListener('beforeinstallprompt', function (e) {
      e.preventDefault();
      deferredPrompt = e;

      // Mostrar banner após 3 segundos
      setTimeout(function () {
        var banner = document.getElementById('pwa-install-banner');
        if (banner && !localStorage.getItem('pwa-banner-dismissed')) {
          banner.classList.add('show');
        }
      }, 3000);
    });

    window.addEventListener('appinstalled', function () {
      deferredPrompt = null;
      var banner = document.getElementById('pwa-install-banner');
      if (banner) banner.classList.remove('show');
      console.log('[PWA] App instalado!');
    });
  </script>
  <script type="module" crossorigin src="/assets/index-ghkErDd1.js"></script>
</head>

<body class="text-slate-900 dark:text-slate-100 dark:bg-[#0c1222] antialiased overflow-hidden selection:bg-indigo-100 selection:text-indigo-900 transition-colors duration-300">

  <div id="root"></div>

  <!-- PWA Install Banner -->
  <div id="pwa-install-banner" role="dialog" aria-label="Instalar FinNexus">
    <div class="banner-text">
      📱 Instalar FinNexus
      <small>Acesse o app direto da tela inicial, sem browser.</small>
    </div>
    <div style="display:flex;gap:8px;flex-shrink:0">
      <button id="btn-dismiss" onclick="
        document.getElementById('pwa-install-banner').classList.remove('show');
        localStorage.setItem('pwa-banner-dismissed', '1');
      ">Não</button>
      <button id="btn-install" onclick="
        if(window.deferredPrompt) {
          window.deferredPrompt.prompt();
          window.deferredPrompt.userChoice.then(function(r) {
            document.getElementById('pwa-install-banner').classList.remove('show');
            window.deferredPrompt = null;
          });
        }
      ">Instalar</button>
    </div>
  </div>

</body>

</html>
